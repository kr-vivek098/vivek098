<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Traveloop — Create Account</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --gold:#C9A84C;
  --gold-light:#e8c96a;

  --bg:#050c1c;
  --panel:#081428;

  --text:#f0ede6;
  --muted:rgba(240,237,230,0.6);

  --serif:'Playfair Display', serif;
  --sans:'Outfit', sans-serif;
}

/* =========================
   BODY
========================= */

body{

  min-height:100vh;

  overflow:hidden;

  background:
    linear-gradient(rgba(5,12,28,0.78), rgba(5,12,28,0.88)),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2070&auto=format&fit=crop');

  background-size:cover;
  background-position:center;

  font-family:var(--sans);
  color:var(--text);

  display:flex;
  align-items:center;
  justify-content:center;

  padding:24px;

  position:relative;
}

/* background glow */

body::before{

  content:'';

  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at top left, rgba(201,168,76,0.18), transparent 35%),
    radial-gradient(circle at bottom right, rgba(31,201,176,0.12), transparent 35%);

  pointer-events:none;
}

/* =========================
   FLOATING ELEMENTS
========================= */

.float{
  position:absolute;
  border-radius:50%;
  backdrop-filter:blur(8px);
  animation:float 8s ease-in-out infinite;
}

.float1{
  width:140px;
  height:140px;

  top:60px;
  left:80px;

  background:rgba(255,255,255,0.05);
}

.float2{
  width:90px;
  height:90px;

  bottom:100px;
  right:120px;

  background:rgba(201,168,76,0.12);

  animation-delay:2s;
}

.float3{
  width:70px;
  height:70px;

  top:140px;
  right:220px;

  background:rgba(31,201,176,0.12);

  animation-delay:1s;
}

@keyframes float{

  0%,100%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-18px);
  }
}

/* =========================
   MAIN CARD
========================= */

.auth-card{

  width:min(520px, 96vw);

  max-height:92vh;

  overflow-y:auto;

  padding:34px 34px 28px;

  border-radius:28px;

  background:rgba(7,14,31,0.82);

  border:1px solid rgba(201,168,76,0.18);

  backdrop-filter:blur(22px);

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 25px 70px rgba(0,0,0,0.6);

  position:relative;
  z-index:10;
}

/* =========================
   SCROLLBAR
========================= */

.auth-card::-webkit-scrollbar{
  width:6px;
}

.auth-card::-webkit-scrollbar-thumb{
  background:rgba(201,168,76,0.4);
  border-radius:20px;
}

/* =========================
   LOGO
========================= */

.logo{

  display:flex;
  align-items:center;
  gap:12px;

  margin-bottom:26px;
}

.logo-icon{
  width:42px;
  height:42px;
}

.logo-text{

  font-family:var(--serif);

  font-size:1.7rem;
  font-weight:600;
}

.logo-text span{
  color:var(--gold);
}

/* =========================
   HEADING
========================= */

.eyebrow{

  font-size:0.7rem;

  letter-spacing:0.24em;

  text-transform:uppercase;

  color:var(--gold);

  margin-bottom:14px;
}

.title{

  font-family:var(--serif);

  font-size:2.1rem;

  line-height:1.1;

  margin-bottom:12px;
}

.title em{
  color:var(--gold-light);
  font-style:italic;
}

.subtitle{

  color:var(--muted);

  font-size:0.88rem;

  line-height:1.7;

  margin-bottom:24px;
}

/* =========================
   SOCIAL BUTTONS
========================= */

.socials{

  display:flex;

  gap:10px;

  margin-bottom:18px;
}

.social-btn{

  flex:1;

  height:46px;

  border:none;

  border-radius:12px;

  background:rgba(255,255,255,0.06);

  color:var(--text);

  font-family:var(--sans);

  font-size:0.86rem;

  cursor:pointer;

  transition:0.25s;
}

.social-btn:hover{

  background:rgba(255,255,255,0.12);

  transform:translateY(-2px);
}

/* =========================
   DIVIDER
========================= */

.divider{

  display:flex;
  align-items:center;

  gap:12px;

  margin:24px 0;
}

.divider::before,
.divider::after{

  content:'';

  flex:1;

  height:1px;

  background:rgba(255,255,255,0.08);
}

.divider span{

  font-size:0.7rem;

  letter-spacing:0.12em;

  text-transform:uppercase;

  color:var(--muted);
}

/* =========================
   FORM
========================= */

.field{
  margin-bottom:18px;
}

.field label{

  display:block;

  margin-bottom:8px;

  font-size:0.72rem;

  letter-spacing:0.14em;

  text-transform:uppercase;

  color:var(--muted);
}

.input-box{
  position:relative;
}

.input-box input{

  width:100%;

  height:50px;

  background:rgba(255,255,255,0.05);

  border:1px solid rgba(201,168,76,0.18);

  border-radius:14px;

  padding:0 16px;

  color:var(--text);

  font-size:0.9rem;

  outline:none;

  transition:0.25s;
}

.input-box input::placeholder{
  color:rgba(255,255,255,0.22);
}

.input-box input:focus{

  border-color:rgba(201,168,76,0.5);

  background:rgba(255,255,255,0.08);

  box-shadow:0 0 0 4px rgba(201,168,76,0.08);
}

/* =========================
   BUTTON
========================= */

.create-btn{

  width:100%;

  height:52px;

  margin-top:10px;

  border:none;

  border-radius:14px;

  background:
    linear-gradient(
      120deg,
      #b8922e 0%,
      #e8c96a 50%,
      #b8922e 100%
    );

  background-size:200%;

  color:#1b1202;

  font-size:0.8rem;

  font-weight:700;

  letter-spacing:0.15em;

  text-transform:uppercase;

  cursor:pointer;

  transition:0.3s;
}

.create-btn:hover{

  background-position:right;

  transform:translateY(-2px);

  box-shadow:0 10px 30px rgba(201,168,76,0.35);
}

/* =========================
   FOOTER
========================= */

.footer{

  margin-top:24px;

  text-align:center;

  font-size:0.78rem;

  line-height:1.7;

  color:var(--muted);
}

.footer span{
  color:var(--gold);
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

  body{
    padding:14px;
  }

  .auth-card{

    width:100%;

    max-height:94vh;

    padding:26px 20px;
  }

  .title{
    font-size:1.8rem;
  }

  .subtitle{
    font-size:0.82rem;
  }

  .socials{
    flex-direction:column;
  }
}

</style>
</head>

<body>

<!-- floating circles -->

<div class="float float1"></div>
<div class="float float2"></div>
<div class="float float3"></div>

<!-- main card -->

<div class="auth-card">

  <!-- logo -->

  <div class="logo">

    <svg class="logo-icon" viewBox="0 0 34 34" fill="none">

      <circle
        cx="17"
        cy="17"
        r="15"
        stroke="#C9A84C"
        stroke-width="1.3"
      />

      <ellipse
        cx="17"
        cy="17"
        rx="6.5"
        ry="15"
        stroke="#C9A84C"
        stroke-width="1.3"
      />

      <line
        x1="2"
        y1="17"
        x2="32"
        y2="17"
        stroke="#C9A84C"
        stroke-width="1.3"
      />

    </svg>

    <div class="logo-text">
      Travel<span>oop</span>
    </div>

  </div>

  <!-- heading -->

  <div class="eyebrow">
    Begin Your Journey
  </div>

  <h1 class="title">
    Create your<br>
    <em>travel account</em>
  </h1>

  <p class="subtitle">
    Plan unforgettable adventures, organize itineraries,
    and explore the world smarter with Traveloop.
  </p>

  <!-- socials -->

  <div class="socials">

    <button class="social-btn">
      Continue with Google
    </button>

    <button class="social-btn">
      Continue with Phone
    </button>

  </div>

  <!-- divider -->

  <div class="divider">
    <span>Create with email</span>
  </div>

  <!-- form -->

  <div class="field">

    <label>Full Name</label>

    <div class="input-box">
      <input
        type="text"
        placeholder="Alex Morgan"
      >
    </div>

  </div>

  <div class="field">

    <label>Email Address</label>

    <div class="input-box">
      <input
        type="email"
        placeholder="hello@example.com"
      >
    </div>

  </div>

  <div class="field">

    <label>Password</label>

    <div class="input-box">
      <input
        type="password"
        placeholder="Create a strong password"
      >
    </div>

  </div>

  <div class="field">

    <label>Confirm Password</label>

    <div class="input-box">
      <input
        type="password"
        placeholder="Confirm password"
      >
    </div>

  </div>

  <!-- button -->

  <button class="create-btn">
    Start Exploring
  </button>

  <!-- footer -->

  <div class="footer">

    By creating an account you agree to
    Traveloop's

    <span>
      Terms & Privacy Policy
    </span>

  </div>

</div>

</body>
</html>
