<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Traveloop – Plan a Trip</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg:       #080c18;
    --surface:  rgba(15, 21, 39, 0.82);
    --surface2: rgba(22, 30, 53, 0.88);
    --accent:   #f5a623;
    --rose:     #e8507a;
    --sky:      #4fc3f7;
    --text:     #eaecf8;
    --muted:    #6b7db3;
    --error:    #ff6b6b;
    --success:  #5ef0a0;
    --border:   rgba(245,166,35,0.22);
    --r:        14px;
    --font-d:   'DM Serif Display', serif;
    --font-u:   'Syne', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-u);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* =========================
      3D TRAVEL BACKGROUND
  ========================== */

  .travel-bg {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    perspective: 1200px;
    background:
      radial-gradient(circle at top left, rgba(79,195,247,.15), transparent 30%),
      radial-gradient(circle at bottom right, rgba(232,80,122,.12), transparent 30%),
      linear-gradient(to bottom, #081120 0%, #09101c 50%, #05070d 100%);
  }

  /* floating aurora */
  .aurora {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    filter: blur(80px);
    opacity: .22;
    animation: floatAurora 18s ease-in-out infinite alternate;
  }

  .aurora.a1 {
    background: #4fc3f7;
    top: -220px;
    left: -160px;
  }

  .aurora.a2 {
    background: #f5a623;
    bottom: -280px;
    right: -160px;
    animation-delay: 4s;
  }

  @keyframes floatAurora {
    from {
      transform: translateY(0) scale(1);
    }
    to {
      transform: translateY(40px) scale(1.12);
    }
  }

  /* 3d globe */
  .globe {
    position: absolute;
    right: 6%;
    top: 10%;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background:
      url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5ce?q=80&w=1200&auto=format&fit=crop')
      center/cover;
    box-shadow:
      inset -30px -30px 60px rgba(0,0,0,.55),
      inset 20px 20px 40px rgba(255,255,255,.08),
      0 0 60px rgba(79,195,247,.25);
    animation:
      rotateGlobe 25s linear infinite,
      globeFloat 7s ease-in-out infinite;
    transform-style: preserve-3d;
    opacity: .8;
  }

  .globe::before {
    content: '';
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    border: 2px solid rgba(79,195,247,.2);
    transform: translateZ(-30px);
  }

  @keyframes rotateGlobe {
    from {
      background-position: 0 center;
    }
    to {
      background-position: -800px center;
    }
  }

  @keyframes globeFloat {
    0%,100% {
      transform: translateY(0) rotateY(0deg);
    }
    50% {
      transform: translateY(-18px) rotateY(12deg);
    }
  }

  /* airplane */
  .plane {
    position: absolute;
    top: 18%;
    left: -200px;
    font-size: 5rem;
    filter: drop-shadow(0 0 18px rgba(255,255,255,.35));
    animation: flyPlane 18s linear infinite;
    transform-style: preserve-3d;
  }

  @keyframes flyPlane {
    0% {
      transform: translateX(0) translateY(0) rotate(8deg) scale(1);
      opacity: 0;
    }
    10% {
      opacity: .95;
    }
    50% {
      transform: translateX(55vw) translateY(-70px) rotate(2deg) scale(1.08);
    }
    100% {
      transform: translateX(120vw) translateY(-120px) rotate(-5deg) scale(.9);
      opacity: 0;
    }
  }

  /* suitcase */
  .suitcase {
    position: absolute;
    bottom: 8%;
    left: 5%;
    width: 140px;
    height: 160px;
    border-radius: 24px;
    background: linear-gradient(145deg, #f5a623, #e07f00);
    box-shadow:
      0 25px 45px rgba(0,0,0,.4),
      inset 0 2px 10px rgba(255,255,255,.18);
    transform-style: preserve-3d;
    animation: suitcaseFloat 6s ease-in-out infinite;
    opacity: .9;
  }

  .suitcase::before {
    content: '';
    position: absolute;
    width: 60px;
    height: 20px;
    border: 6px solid #f7d79c;
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    top: -26px;
    left: 50%;
    transform: translateX(-50%);
  }

  .suitcase::after {
    content: '✈';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: rgba(255,255,255,.9);
  }

  @keyframes suitcaseFloat {
    0%,100% {
      transform: rotateX(0deg) rotateY(0deg) translateY(0);
    }
    50% {
      transform: rotateX(6deg) rotateY(-8deg) translateY(-14px);
    }
  }

  /* mountains */
  .mountains {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 240px;
    background:
      linear-gradient(135deg, transparent 25%, #0f1527 25%) -50px 0/120px 120px,
      linear-gradient(225deg, transparent 25%, #131b31 25%) -50px 0/120px 120px;
    opacity: .55;
    transform: perspective(900px) rotateX(60deg);
  }

  /* stars */
  .stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: .18;
    animation: starsMove 50s linear infinite;
  }

  @keyframes starsMove {
    from {
      transform: translateY(0);
    }
    to {
      transform: translateY(-200px);
    }
  }

  /* ========================= */

  .mesh {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 65% 55% at 15% 8%, rgba(245,166,35,.13) 0%, transparent 70%),
      radial-gradient(ellipse 55% 45% at 85% 92%, rgba(232,80,122,.10) 0%, transparent 70%),
      radial-gradient(ellipse 40% 38% at 60% 42%, rgba(79,195,247,.07) 0%, transparent 60%);
  }

  .dots {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image: radial-gradient(rgba(255,255,255,.055) 1px, transparent 1px);
    background-size: 30px 30px;
  }

  .page {
    position: relative;
    z-index: 5;
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 90px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 50px;
    animation: slideD .6s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes slideD {
    from {
      opacity: 0;
      transform: translateY(-22px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .logo {
    font-family: var(--font-d);
    font-size: 1.65rem;
    background: linear-gradient(130deg, var(--accent), var(--rose));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo em {
    font-style: italic;
  }

  .step-pill {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 999px;
    backdrop-filter: blur(10px);
  }

  .hero {
    margin-bottom: 36px;
  }

  .hero h1 {
    font-family: var(--font-d);
    font-size: clamp(2rem,5vw,2.9rem);
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .hero h1 em {
    font-style: italic;
    background: linear-gradient(90deg, var(--accent), var(--rose));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: var(--muted);
    font-size: .93rem;
    line-height: 1.65;
  }

  .man-note {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .75rem;
    color: var(--muted);
    padding: 12px 16px;
    background: rgba(232,80,122,.07);
    border: 1px solid rgba(232,80,122,.22);
    border-radius: 10px;
    margin-bottom: 32px;
    backdrop-filter: blur(10px);
  }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 42px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(16px);
  }

  .form-card::before {
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:3px;
    background: linear-gradient(90deg, var(--accent), var(--rose), var(--sky));
  }

  .field-group {
    display:flex;
    flex-direction:column;
    gap:28px;
  }

  .field {
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .field label {
    font-size:.76rem;
    font-weight:700;
    letter-spacing:.11em;
    text-transform:uppercase;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:7px;
  }

  .rdot {
    width:7px;
    height:7px;
    background:var(--rose);
    border-radius:50%;
  }

  input[type=text],
  input[type=date],
  textarea {
    background: var(--surface2);
    border: 1.5px solid rgba(255,255,255,.07);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--font-u);
    font-size: .96rem;
    padding: 14px 16px;
    width: 100%;
    outline: none;
    transition: .25s;
    backdrop-filter: blur(12px);
  }

  input[type=text]:focus,
  input[type=date]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,166,35,.14);
    background: #1c2340;
  }

  textarea {
    min-height:110px;
    resize:vertical;
  }

  .date-row {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .upload-zone {
    background:var(--surface2);
    border:2px dashed rgba(255,255,255,.1);
    border-radius:var(--r);
    padding:32px 20px;
    text-align:center;
    position:relative;
    overflow:hidden;
    transition:.25s;
  }

  .upload-zone:hover {
    border-color:var(--accent);
    background:rgba(245,166,35,.05);
  }

  .upload-zone input[type=file] {
    position:absolute;
    inset:0;
    opacity:0;
    width:100%;
    height:100%;
    cursor:pointer;
  }

  .upload-icon {
    width:44px;
    height:44px;
    background:linear-gradient(135deg,rgba(245,166,35,.2),rgba(232,80,122,.2));
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 12px;
    font-size:1.25rem;
  }

  #prevImg {
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:12px;
    display:none;
  }

  .div {
    height:1px;
    background:linear-gradient(90deg,transparent,var(--border),transparent);
    margin:28px 0;
  }

  .btn {
    width:100%;
    padding:16px;
    background:linear-gradient(135deg, var(--accent), var(--rose));
    border:none;
    border-radius:var(--r);
    color:#fff;
    font-family:var(--font-u);
    font-size:1rem;
    font-weight:800;
    letter-spacing:.07em;
    text-transform:uppercase;
    cursor:pointer;
    transition:.25s;
  }

  .btn:hover {
    transform:translateY(-3px);
    box-shadow:0 10px 36px rgba(245,166,35,.35);
  }

  .toast {
    position:fixed;
    bottom:32px;
    left:50%;
    transform:translateX(-50%) translateY(90px);
    background:var(--surface2);
    border:1px solid var(--success);
    color:var(--success);
    padding:14px 26px;
    border-radius:12px;
    font-size:.88rem;
    font-weight:700;
    z-index:999;
    transition:.4s;
  }

  .toast.show {
    transform:translateX(-50%) translateY(0);
  }

  .opt-tag {
    font-size:.65rem;
    color:var(--sky);
    border:1px solid var(--sky);
    border-radius:4px;
    padding:2px 7px;
  }

  @media(max-width:540px){
    .form-card {
      padding:26px 18px 22px;
    }

    .date-row {
      grid-template-columns:1fr;
    }

    header {
      flex-direction:column;
      align-items:flex-start;
      gap:12px;
    }

    .globe {
      width: 180px;
      height: 180px;
      right: -40px;
      top: 60px;
      opacity: .4;
    }

    .suitcase {
      width: 90px;
      height: 110px;
    }

    .plane {
      font-size: 3rem;
    }
  }
</style>
</head>

<body>

<!-- 3D TRAVEL BACKGROUND -->
<div class="travel-bg">
  <div class="stars"></div>

  <div class="aurora a1"></div>
  <div class="aurora a2"></div>

  <div class="globe"></div>

  <div class="plane">✈️</div>

  <div class="suitcase"></div>

  <div class="mountains"></div>
</div>

<div class="mesh"></div>
<div class="dots"></div>

<div class="page">

  <header>
    <div class="logo">Travel<em>loop</em></div>
    <div class="step-pill">Start your Journey</div>
  </header>

  <div class="hero">
    <h1>Plan your <em>next adventure</em></h1>
    <p>
      Fill in the details below. Every field marked with a red dot is required —
      we need them to build your perfect personalised itinerary.
    </p>
  </div>

  <div class="man-note">
    <span style="font-size:1.1rem">🔴</span>
    <span>
      Fields marked with a
      <strong style="color:var(--rose)">red dot (●)</strong>
      are <strong>mandatory</strong>.
    </span>
  </div>

  <div class="form-card" id="card">

    <div class="field-group">

      <div class="field">
        <label><span class="rdot"></span>Trip Name</label>
        <input type="text" id="tripName" placeholder="e.g. Swiss Alps Getaway 2026"/>
      </div>

      <div class="field">
        <label><span class="rdot"></span>Travel Dates</label>

        <div class="date-row">
          <input type="date" id="startDate"/>
          <input type="date" id="endDate"/>
        </div>
      </div>

      <div class="field">
        <label><span class="rdot"></span>Trip Description</label>

        <textarea id="tripDesc"
          placeholder="What's the vibe? Who's joining? Any must-do experiences or bucket-list moments?"></textarea>
      </div>

      <div class="field">
        <label>
          🌄 Cover Photo
          <span class="opt-tag">Optional</span>
        </label>

        <div class="upload-zone" id="upZone">
          <input type="file" id="coverPhoto" accept="image/*"/>

          <div class="upload-icon">🌄</div>

          <div class="upload-title">
            Drop your cover photo here
          </div>

          <div class="upload-sub">
            PNG · JPG · WEBP
          </div>

          <img id="prevImg" src="" alt="Preview"/>
        </div>
      </div>

    </div>

    <div class="div"></div>

    <button class="btn" onclick="handleSave()">
      Save & Continue →
    </button>

  </div>

</div>

<!-- <div class="toast" id="toast">
  ✅ Trip saved! Moving to next step…
</div> -->

<script>
  const upZone = document.getElementById('upZone');
  const prevImg = document.getElementById('prevImg');

  document.getElementById('coverPhoto').addEventListener('change', e => {
    const file = e.target.files[0];

    if(!file) return;

    prevImg.src = URL.createObjectURL(file);
    prevImg.style.display = 'block';

    upZone.querySelector('.upload-icon').style.display = 'none';
    upZone.querySelector('.upload-title').style.display = 'none';
    upZone.querySelector('.upload-sub').style.display = 'none';
  });

  function handleSave() {
    const toast = document.getElementById('toast');

    toast.classList.add('show');

    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }
</script>

</body>
</html>
